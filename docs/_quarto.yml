project:
  type: website
  pre-render: filters/pre-render.lua
  preview:
    port: 4200

website:
  title: "Panache: Language Server, Formatter, and Linter for Pandoc, Quarto, and R Markdown"
  description: >-
    Panache provides authoring tools for Pandoc, Quarto, and R Markdown: a
    language server, formatter, and linter to help you write better documents,
    more efficiently.

  site-url: "https://panache.bz"
  repo-url: "https://github.com/jolars/panache"
  issue-url: "https://github.com/jolars/panache/issues"

  repo-actions: [edit, issue]

  search: true

  image: images/og.png
  image-alt: "Panache logo"

  twitter-card: true

  open-graph:
    locale: en_US
    site-name: "Panache"

  page-footer:
    left: "panache v{{< meta version >}} | Copyright 2026, Johan Larsson"
    right:
      - icon: github
        href: "https://github.com/jolars/panache"
        aria-label: "Source for this webpage"

  navbar:
    logo:
      light: images/logo-with-text.svg
      dark: images/logo-with-text-dark.svg
    logo-alt: "Panache logo"

    title: false

    tools:
      - icon: github
        href: "https://github.com/jolars/panache"

    left:
      - href: index.qmd
        text: Overview
      - href: getting-started.qmd
        text: Getting Started
      - href: user-guide
        text: User Guide
      - text: Help
        menu:
          - text: Report a bug
            icon: "bug"
            href: "https://github.com/jolars/panache/issues"
          - text: Ask a question
            icon: "chat-right-text"
            href: "https://github.com/jolars/panache/discussions"
      - href: playground/index.html
        text: "Playground"
        icon: box-arrow-up-right
        target: _blank

  sidebar:
    - id: user-guide
      text: User Guide
      style: floating
      contents:
        - user-guide/index.qmd
        - href: user-guide/formatting.qmd
          text: Formatting
        - href: user-guide/linting.qmd
          text: Linting
        - href: user-guide/lsp.qmd
          text: Language Server
        - href: user-guide/configuration.qmd
          text: Configuration
        - href: user-guide/cli.qmd
          text: Command Line Interface
        - href: user-guide/integrations.qmd
          text: Integrations

resources:
  - "playground/**"
  - "apple-touch-icon.png"
  - "favicon-96x96.png"
  - "favicon.ico"
  - "favicon.svg"
  - "site.webmanifest"
  - "web-app-manifest-192x192.png"
  - "web-app-manifest-512x512.png"

highlight-style: breeze

format:
  html:
    toc: true
    theme:
      light: cosmo
      dark: [cosmo, theme-dark.scss]
    html-math-method: katex
    pagetitle: "{{< meta title >}}"
    code-copy: true
    include-in-header: _includes/social-extra.html

toc: true
date-format: "D MMMM YYYY"

filters:
  - filters/pre-render.lua
