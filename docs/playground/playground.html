<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Panache Playground</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, sans-serif;
        color: #1f2937;
        background: transparent;
      }

      .wrap {
        padding: 0.75rem;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 0.75rem;
      }

      .toolbar label {
        font-size: 0.9rem;
        font-weight: 600;
      }

      .toolbar input,
      .toolbar button {
        font: inherit;
        border: 1px solid #cbd5e1;
        border-radius: 0.5rem;
        padding: 0.4rem 0.6rem;
        background: #fff;
      }

      .toolbar button {
        cursor: pointer;
      }

      .toolbar button:hover {
        background: #f8fafc;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
      }

      .pane-title {
        display: block;
        margin: 0 0 0.35rem;
        font-size: 0.82rem;
        text-transform: uppercase;
        letter-spacing: 0.02em;
        color: #64748b;
        font-weight: 700;
      }

      .editor {
        width: 100%;
        min-height: 68vh;
        border: 1px solid #dbe3ed;
        border-radius: 0.6rem;
        background: #fff;
        padding: 0.75rem;
        resize: vertical;
        box-sizing: border-box;
        font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
        font-size: 0.9rem;
        line-height: 1.45;
      }

      .editor[readonly] {
        background: #f8fafc;
      }

      #status {
        margin: 0.6rem 0 0;
        font-size: 0.85rem;
        color: #64748b;
      }

      #status.error {
        color: #b91c1c;
      }

      @media (max-width: 900px) {
        .grid {
          grid-template-columns: 1fr;
        }

        .editor {
          min-height: 42vh;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="toolbar">
        <label for="lw">Line width</label>
        <input id="lw" type="number" min="10" max="200" value="80">
        <button id="copy-output" type="button">Copy output</button>
        <button id="reset-input" type="button">Reset sample</button>
      </div>

      <section class="grid">
        <div>
          <label class="pane-title" for="input">Input</label>
          <textarea id="input" class="editor" placeholder="Paste Quarto or Markdown here..."></textarea>
        </div>
        <div>
          <label class="pane-title" for="output">Formatted Output</label>
          <textarea id="output" class="editor" readonly></textarea>
        </div>
      </section>

      <p id="status" role="status" aria-live="polite"></p>
    </main>

    <script type="module">
      import init, { format_qmd } from "./pkg/panache_wasm.js";

      const SAMPLE = "---\ntitle: Demo\n---\n\nThis is a very long line that should be wrapped.\n\n```{r}\nprint(1)\n```\n\n$$\nA &= B \\\\\nC &= D\n$$\n";

      const $ = (id) => document.getElementById(id);
      const statusEl = $("status");

      function setStatus(text, isError = false) {
        statusEl.textContent = text;
        statusEl.classList.toggle("error", isError);
      }

      function applyFormat() {
        const input = $("input").value;
        const lineWidth = parseInt($("lw").value || "80", 10);

        if (Number.isNaN(lineWidth) || lineWidth < 10 || lineWidth > 200) {
          setStatus("Line width must be between 10 and 200.", true);
          return;
        }

        try {
          $("output").value = format_qmd(input, lineWidth);
          const params = new URLSearchParams({ lw: String(lineWidth) });
          history.replaceState(null, "", "?" + params.toString());
          setStatus("Formatted successfully.");
        } catch (error) {
          $("output").value = "";
          setStatus("Formatting failed: " + (error?.message || String(error)), true);
        }
      }

      function resetSample() {
        $("input").value = SAMPLE;
        applyFormat();
      }

      async function main() {
        await init();

        const query = new URLSearchParams(location.search);
        if (query.get("lw")) {
          $("lw").value = query.get("lw");
        }

        $("input").addEventListener("input", applyFormat);
        $("lw").addEventListener("input", applyFormat);
        $("reset-input").addEventListener("click", resetSample);
        $("copy-output").addEventListener("click", async () => {
          try {
            await navigator.clipboard.writeText($("output").value);
            setStatus("Output copied to clipboard.");
          } catch {
            setStatus("Could not copy output in this browser context.", true);
          }
        });

        resetSample();
      }

      main().catch((error) => {
        setStatus("Failed to initialize playground: " + (error?.message || String(error)), true);
      });
    </script>
  </body>
</html>
