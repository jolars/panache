name: Bug Report
description: Report a bug in panache (formatter, linter, LSP, or parser)
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please provide as much detail as possible to help us reproduce and fix the issue.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - Formatter
        - Linter
        - LSP (Language Server)
        - CLI
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Panache Version
      description: "Run `panache --version` to get the version"
      placeholder: "e.g., 2.7.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: What operating system are you using?
      placeholder: "e.g., Ubuntu 24.04, macOS 14.2, Windows 11"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug
      placeholder: Tell us what happened
    validations:
      required: true

  - type: textarea
    id: input
    attributes:
      label: Input Document
      description: Provide a minimal example that reproduces the issue
      placeholder: |
        # Example heading

        This is a paragraph with **bold** text.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Output
      description: What output did you expect?
      placeholder: Describe or paste the expected output
      render: markdown
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Output
      description: What output did you actually get?
      placeholder: Describe or paste the actual output
      render: markdown
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: If relevant, provide your `.panache.toml` or `panache.toml` configuration
      placeholder: |
        flavor = "Quarto"
        line-width = 80
        wrap = "Reflow"
      render: toml

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (error messages, screenshots, etc.)
