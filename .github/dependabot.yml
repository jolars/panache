version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "zed_extension_api"
        versions: [">=0.7.0"]
  - package-ecosystem: "npm"
    directory: "/editors/code"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "@types/vscode"
  - package-ecosystem: "npm"
    directory: "/npm/panache-cli"
    schedule:
      interval: "weekly"
