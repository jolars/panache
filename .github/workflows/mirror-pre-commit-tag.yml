name: Mirror pre-commit tag

# Mirrors panache's `vX.Y.Z` release tags to jolars/panache-pre-commit, the
# pre-commit hook shim. The shim repo carries only `vX.Y.Z` tags so
# `pre-commit autoupdate` resolves cleanly. (This repo also tags sub-packages
# like `panache-code-*`, which would otherwise confuse autoupdate; see #260.)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to mirror (e.g. v2.43.1)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "name=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout panache-pre-commit
        uses: actions/checkout@v6
        with:
          repository: jolars/panache-pre-commit
          token: ${{ secrets.PANACHE_PRE_COMMIT_TOKEN }}

      - name: Bump package.json
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail
          jq --arg v "$VERSION" \
            '.version = $v | .dependencies["@panache-cli/panache"] = $v' \
            package.json > package.json.tmp
          mv package.json.tmp package.json
          cat package.json

      - name: Commit, tag, and push
        env:
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse --verify --quiet "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists — nothing to do."
            exit 0
          fi

          if ! git diff --quiet; then
            git add package.json
            git commit -m "release $TAG"
            git push origin main
          fi

          git tag "$TAG"
          git push origin "refs/tags/$TAG"
