name: Smoke Test

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

env:
  CARGO_TERM_COLOR: always

jobs:
  debug-format-repo-scan:
    name: Scan Repositories
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    outputs:
      failure_count: ${{ steps.summarize.outputs.failure_count }}
    env:
      TARGET_REPOS: |
        quarto-dev/quarto-web
        rstudio/bookdown
        rstudio/rmarkdown
        jgm/pandoc
        wch/rgcookbook
        rstudio/rmarkdown-cookbook
        mattiasvillani/BayesianLearningBook
        nielsrhansen/CSwR
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-scan-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-scan-
            ${{ runner.os }}-cargo-

      - name: Build panache binary
        run: cargo build --release --verbose

      - name: Scan repositories for debug-format regressions
        id: scan
        shell: bash
        run: |
          set -euo pipefail
          PANACHE_BIN="$GITHUB_WORKSPACE/target/release/panache"
          RESULTS_DIR="$RUNNER_TEMP/panache-debug-format-scan"
          REPOS_DIR="$RESULTS_DIR/repos"
          LOGS_DIR="$RESULTS_DIR/logs"
          mkdir -p "$REPOS_DIR" "$LOGS_DIR"
          SCAN_MAX_MINUTES=80

          FAILURES_TSV="$RESULTS_DIR/failures.tsv"
          STATS_FILE="$RESULTS_DIR/stats.env"
          {
            printf 'repo\tfailure_type\tfile\tlog_path\n'
          } > "$FAILURES_TSV"

          scan_start_epoch="$(date +%s)"
          scan_deadline_epoch="$((scan_start_epoch + (SCAN_MAX_MINUTES * 60)))"
          repos_scanned=0
          files_scanned=0
          budget_exceeded=0

          while IFS= read -r repo; do
            if [ -z "$repo" ]; then
              continue
            fi

            now_epoch="$(date +%s)"
            if [ "$now_epoch" -ge "$scan_deadline_epoch" ]; then
              budget_exceeded=1
              echo "::warning title=Scan budget reached::Stopping before job timeout after ${SCAN_MAX_MINUTES}m."
              printf '%s\t%s\t%s\t%s\n' "$repo" "unknown" "[scan budget reached after ${SCAN_MAX_MINUTES}m]" "" >> "$FAILURES_TSV"
              break
            fi

            repos_scanned=$((repos_scanned + 1))
            repo_dir="$REPOS_DIR/${repo//\//__}"
            clone_log="$LOGS_DIR/${repo//\//__}__clone.log"
            echo "Scanning repository: $repo"
            if timeout 20m git clone --depth 1 --filter=blob:none "https://github.com/${repo}.git" "$repo_dir" >"$clone_log" 2>&1; then
              :
            else
              clone_exit=$?
              printf '%s\t%s\t%s\t%s\n' "$repo" "unknown" "[repo clone failed: exit=$clone_exit]" "logs/${repo//\//__}__clone.log" >> "$FAILURES_TSV"
              echo "::error title=Repository clone failed::$repo (exit=$clone_exit). See logs/${repo//\//__}__clone.log in artifact."
              tail -n 40 "$clone_log" || true
              continue
            fi

            repo_file_list="$LOGS_DIR/${repo//\//__}__files.zlist"
            file_count=0
            repo_files=()
            git -C "$repo_dir" ls-files -z -- '*.md' '*.qmd' '*.Rmd' '*.markdown' '*.mdown' '*.mkd' >"$repo_file_list"
            while IFS= read -r -d '' rel_file; do
              file_count=$((file_count + 1))
              repo_files+=("$repo_dir/$rel_file")
            done < "$repo_file_list"
            echo "Found $file_count candidate files in $repo"
            files_scanned=$((files_scanned + file_count))

            if [ "$file_count" -eq 0 ]; then
              continue
            fi

            now_epoch="$(date +%s)"
            if [ "$now_epoch" -ge "$scan_deadline_epoch" ]; then
              budget_exceeded=1
              echo "::warning title=Scan budget reached::Stopping before job timeout after ${SCAN_MAX_MINUTES}m."
              printf '%s\t%s\t%s\t%s\n' "$repo" "unknown" "[scan budget reached after ${SCAN_MAX_MINUTES}m]" "" >> "$FAILURES_TSV"
              break
            fi

            repo_json="$LOGS_DIR/${repo//\//__}__debug-format.json"
            repo_err="$LOGS_DIR/${repo//\//__}__debug-format.err.log"
            echo "Running panache once for $repo ($file_count files)"
            if timeout 45m "$PANACHE_BIN" debug format --checks all --json "${repo_files[@]}" >"$repo_json" 2>"$repo_err"; then
              repo_scan_exit=0
            else
              repo_scan_exit=$?
            fi

            if [ "$repo_scan_exit" -eq 124 ]; then
              printf '%s\t%s\t%s\t%s\n' "$repo" "unknown" "[repo debug-format timed out after 45m]" "logs/${repo//\//__}__debug-format.err.log" >> "$FAILURES_TSV"
              echo "::error title=Repository scan timeout::$repo timed out. See logs/${repo//\//__}__debug-format.err.log in artifact."
              continue
            fi

            if [ ! -s "$repo_json" ]; then
              printf '%s\t%s\t%s\t%s\n' "$repo" "unknown" "[repo debug-format produced no JSON output: exit=$repo_scan_exit]" "logs/${repo//\//__}__debug-format.err.log" >> "$FAILURES_TSV"
              echo "::error title=Repository scan missing JSON::$repo produced no JSON output (exit=$repo_scan_exit)."
              tail -n 40 "$repo_err" || true
              continue
            fi

            if ! python3 - "$repo" "$repo_json" "$FAILURES_TSV" <<'PY'
import json
import sys

repo, json_path, failures_tsv = sys.argv[1:4]
try:
    with open(json_path, encoding="utf-8") as f:
        payload = json.load(f)
except Exception as exc:
    print(f"failed to parse JSON from {json_path}: {exc}", file=sys.stderr)
    sys.exit(1)

failures = payload.get("failures", [])
with open(failures_tsv, "a", encoding="utf-8") as out:
    for item in failures:
        failure_type = str(item.get("kind", "unknown")).strip().lower()
        if failure_type not in {"idempotency", "losslessness"}:
            failure_type = "unknown"
        file_label = str(item.get("file", "<unknown>"))
        log_path = f"logs/{repo.replace('/', '__')}__debug-format.json"
        out.write(f"{repo}\t{failure_type}\t{file_label}\t{log_path}\n")
PY
            then
              printf '%s\t%s\t%s\t%s\n' "$repo" "unknown" "[failed to parse debug-format JSON output]" "logs/${repo//\//__}__debug-format.json" >> "$FAILURES_TSV"
              echo "::error title=Repository scan JSON parse failed::$repo JSON parse failed."
              continue
            fi

            if [ "$budget_exceeded" -eq 1 ]; then
              break
            fi
          done <<< "$TARGET_REPOS"

          {
            echo "repos_scanned=$repos_scanned"
            echo "files_scanned=$files_scanned"
            echo "scan_budget_minutes=$SCAN_MAX_MINUTES"
            echo "scan_budget_exceeded=$budget_exceeded"
          } > "$STATS_FILE"

      - name: Summarize scan results
        id: summarize
        shell: bash
        run: |
          set -euo pipefail
          RESULTS_DIR="$RUNNER_TEMP/panache-debug-format-scan"
          FAILURES_TSV="$RESULTS_DIR/failures.tsv"
          STATS_FILE="$RESULTS_DIR/stats.env"
          if [ -f "$STATS_FILE" ]; then
            # shellcheck disable=SC1090
            source "$STATS_FILE"
          else
            repos_scanned=0
            files_scanned=0
            scan_budget_minutes=0
            scan_budget_exceeded=0
          fi
          failure_count="$(($(wc -l < "$FAILURES_TSV") - 1))"
          if [ "$failure_count" -lt 0 ]; then
            failure_count=0
          fi

          echo "failure_count=$failure_count" >> "$GITHUB_OUTPUT"
          echo "### Panache debug format repo scan" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Failure records: $failure_count" >> "$GITHUB_STEP_SUMMARY"
          echo "- Repositories scanned: $repos_scanned" >> "$GITHUB_STEP_SUMMARY"
          echo "- Files scanned: $files_scanned" >> "$GITHUB_STEP_SUMMARY"
          echo "- Scanned extensions: \`.md\`, \`.qmd\`, \`.Rmd\`" >> "$GITHUB_STEP_SUMMARY"
          if [ "${scan_budget_exceeded:-0}" = "1" ]; then
            echo "- Scan budget reached: yes (${scan_budget_minutes}m limit)" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "$failure_count" -gt 0 ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Failure breakdown:" >> "$GITHUB_STEP_SUMMARY"
            awk -F '\t' 'NR > 1 {counts[$2]++} END {for (k in counts) printf "- `%s`: %d\n", k, counts[k]}' "$FAILURES_TSV" | sort >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload scan results artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-format-repo-scan-results
          path: ${{ runner.temp }}/panache-debug-format-scan
          if-no-files-found: error

  debug-format-repo-scan-issues:
    name: Create Regression Issues
    needs: debug-format-repo-scan
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Download scan results artifact
        uses: actions/download-artifact@v4
        with:
          name: debug-format-repo-scan-results
          path: ${{ runner.temp }}/panache-debug-format-scan

      - name: Create or update regression issues
        if: needs.debug-format-repo-scan.outputs.failure_count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          RESULTS_DIR="$RUNNER_TEMP/panache-debug-format-scan"
          FAILURES_TSV="$RESULTS_DIR/failures.tsv"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          tail -n +2 "$FAILURES_TSV" | awk -F '\t' '{print $1 "\t" $2}' | sort -u | while IFS=$'\t' read -r repo failure_type; do
            if [ -z "$repo" ] || [ -z "$failure_type" ]; then
              continue
            fi

            marker="panache-debug-format-key:repo=${repo};type=${failure_type}"
            title="CI: debug-format regression in ${repo} (${failure_type})"
            count="$(awk -F '\t' -v r="$repo" -v t="$failure_type" '$1 == r && $2 == t {c++} END {print c+0}' "$FAILURES_TSV")"
            samples="$(awk -F '\t' -v r="$repo" -v t="$failure_type" '$1 == r && $2 == t {printf "- `%s`\n", $3; c++; if (c == 10) exit}' "$FAILURES_TSV")"

            ISSUE_TITLE="$title"
            export ISSUE_TITLE
            issue_number="$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --limit 200 --json number,title --jq '.[] | select(.title == env.ISSUE_TITLE) | .number' | head -n 1)"

            if [ -n "$issue_number" ]; then
              comment_file="$RUNNER_TEMP/panache-issue-comment.md"
              {
                echo "Regression still reproduces for \`$repo\` (\`$failure_type\`)."
                echo ""
                echo "- New failure records: $count"
                echo "- Workflow run: $RUN_URL"
                echo ""
                echo "Sample files:"
                echo "$samples"
              } > "$comment_file"
              gh issue comment "$issue_number" --repo "$GITHUB_REPOSITORY" --body-file "$comment_file"
            else
              body_file="$RUNNER_TEMP/panache-issue-body.md"
              {
                echo "<!-- $marker -->"
                echo "# Debug-format regression detected"
                echo ""
                echo "- Target repository: \`$repo\`"
                echo "- Failure type: \`$failure_type\`"
                echo "- Failure records in this run: $count"
                echo "- Workflow run: $RUN_URL"
                echo ""
                echo "Sample files:"
                echo "$samples"
                echo ""
                echo "See artifact \`debug-format-repo-scan-results\` for full logs."
              } > "$body_file"
              gh issue create \
                --repo "$GITHUB_REPOSITORY" \
                --title "$title" \
                --label "ci" \
                --label "debug-format" \
                --label "$failure_type" \
                --body-file "$body_file"
            fi
          done

      - name: Fail workflow when regressions are detected
        if: needs.debug-format-repo-scan.outputs.failure_count != '0'
        shell: bash
        run: |
          echo "Debug format regressions detected: ${{ needs.debug-format-repo-scan.outputs.failure_count }}"
          exit 1
