name: Publish npm

on:
  workflow_call:
    inputs:
      dry-run:
        description: "Build and assemble packages but do not publish"
        type: boolean
        default: false
      release-tag:
        description: "If set, download binaries from this GitHub release tag instead of same-run workflow artifacts"
        type: string
        required: false
        default: ""
  workflow_dispatch:
    inputs:
      release-tag:
        description: "Release tag to download binaries from"
        type: string
        required: true
      dry-run:
        description: "Build and assemble packages but do not publish"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ inputs.release-tag || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  publish-platform-packages:
    name: Publish @panache-cli/${{ matrix.npm_name }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            npm_name: linux-x64-gnu
            os: linux
            cpu: x64
            libc: glibc
            binary: panache
          - target: aarch64-unknown-linux-gnu
            npm_name: linux-arm64-gnu
            os: linux
            cpu: arm64
            libc: glibc
            binary: panache
          - target: x86_64-unknown-linux-musl
            npm_name: linux-x64-musl
            os: linux
            cpu: x64
            libc: musl
            binary: panache
          - target: aarch64-unknown-linux-musl
            npm_name: linux-arm64-musl
            os: linux
            cpu: arm64
            libc: musl
            binary: panache
          - target: x86_64-apple-darwin
            npm_name: darwin-x64
            os: darwin
            cpu: x64
            binary: panache
          - target: aarch64-apple-darwin
            npm_name: darwin-arm64
            os: darwin
            cpu: arm64
            binary: panache
          - target: x86_64-pc-windows-msvc
            npm_name: win32-x64
            os: win32
            cpu: x64
            binary: panache.exe
          - target: aarch64-pc-windows-msvc
            npm_name: win32-arm64
            os: win32
            cpu: arm64
            binary: panache.exe
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Download binary (workflow artifact)
        if: ${{ inputs.release-tag == '' }}
        uses: actions/download-artifact@v8
        with:
          name: panache-binary-${{ matrix.target }}
          path: binary

      - name: Download binary (release asset)
        if: ${{ inputs.release-tag != '' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p binary
          cd binary
          if [[ "${{ matrix.binary }}" == *.exe ]]; then
            gh release download "${{ inputs.release-tag }}" -p "panache-${{ matrix.target }}.zip" --repo "${{ github.repository }}"
            unzip -j "panache-${{ matrix.target }}.zip" "${{ matrix.binary }}"
            rm "panache-${{ matrix.target }}.zip"
          else
            gh release download "${{ inputs.release-tag }}" -p "panache-${{ matrix.target }}.tar.gz" --repo "${{ github.repository }}"
            tar -xzf "panache-${{ matrix.target }}.tar.gz" "${{ matrix.binary }}"
            rm "panache-${{ matrix.target }}.tar.gz"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Read package version
        id: version
        run: |
          version=$(node -p "require('./npm/panache-cli/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Assemble package
        run: |
          set -euo pipefail
          pkg_dir=staging/${{ matrix.npm_name }}
          mkdir -p "$pkg_dir"
          cp npm/platform-template/package.json "$pkg_dir/package.json"
          cp npm/platform-template/README.md "$pkg_dir/README.md"
          cp LICENSE "$pkg_dir/LICENSE"
          cp binary/${{ matrix.binary }} "$pkg_dir/${{ matrix.binary }}"
          chmod +x "$pkg_dir/${{ matrix.binary }}"

          node -e '
            const fs = require("node:fs");
            const path = process.argv[1];
            const repl = {
              __NAME__: process.env.NPM_NAME,
              __VERSION__: process.env.PKG_VERSION,
              __OS__: process.env.PKG_OS,
              __CPU__: process.env.PKG_CPU,
              __BINARY__: process.env.BINARY,
            };
            let json = JSON.parse(fs.readFileSync(path, "utf8"));
            const subst = (v) => typeof v === "string"
              ? v.replace(/__[A-Z]+__/g, (m) => repl[m] ?? m)
              : Array.isArray(v) ? v.map(subst)
              : v && typeof v === "object" ? Object.fromEntries(Object.entries(v).map(([k, x]) => [k, subst(x)]))
              : v;
            json = subst(json);
            if (process.env.PKG_LIBC) json.libc = [process.env.PKG_LIBC];
            else delete json.libc;
            fs.writeFileSync(path, JSON.stringify(json, null, 2) + "\n");
          ' "$pkg_dir/package.json"

          # Substitute __NAME__ in README
          sed -i "s|__NAME__|${{ matrix.npm_name }}|g" "$pkg_dir/README.md"

          echo "--- package.json ---"
          cat "$pkg_dir/package.json"
        env:
          NPM_NAME: ${{ matrix.npm_name }}
          PKG_VERSION: ${{ steps.version.outputs.version }}
          PKG_OS: ${{ matrix.os }}
          PKG_CPU: ${{ matrix.cpu }}
          PKG_LIBC: ${{ matrix.libc }}
          BINARY: ${{ matrix.binary }}

      - name: Publish to npm
        working-directory: staging/${{ matrix.npm_name }}
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            npm publish --provenance --access public --dry-run
          else
            npm publish --provenance --access public
          fi

  publish-main:
    name: Publish @panache-cli/panache
    needs: publish-platform-packages
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Assemble main package
        run: |
          set -euo pipefail
          pkg_dir=staging/panache-cli
          mkdir -p "$pkg_dir/bin"
          cp npm/panache-cli/package.json "$pkg_dir/package.json"
          cp npm/panache-cli/README.md "$pkg_dir/README.md"
          cp npm/panache-cli/bin/panache.js "$pkg_dir/bin/panache.js"
          cp LICENSE "$pkg_dir/LICENSE"

          echo "--- package.json ---"
          cat "$pkg_dir/package.json"

      - name: Publish to npm
        working-directory: staging/panache-cli
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            npm publish --provenance --access public --dry-run
          else
            npm publish --provenance --access public
          fi
