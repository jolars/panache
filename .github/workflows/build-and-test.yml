name: Build and Test

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * *"

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    if: github.event_name != 'schedule'
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        run: rustup toolchain install

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: "false"
          prefix-key: "v1-rust"

      - name: Install wasm target
        if: matrix.os == 'ubuntu-latest'
        run: rustup target add wasm32-unknown-unknown

      - name: Build panache-wasm
        if: matrix.os == 'ubuntu-latest'
        run: cargo build -p panache-wasm --target wasm32-unknown-unknown --verbose

      - name: Install shfmt for external formatter tests
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y shfmt

      - name: Run tests
        run: cargo test --workspace --verbose

  extension:
    name: VS Code Extension
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editors/code/package-lock.json

      - name: Install dependencies
        working-directory: editors/code
        run: npm ci

      # Type-checks against @types/vscode + vscode-languageclient and bundles
      # with esbuild. Mirrors the check-types + bundle steps that
      # vscode:prepublish runs at release time, so dependency bumps that break
      # the extension fail on the PR instead of at publish.
      - name: Compile extension
        working-directory: editors/code
        run: npm run compile

  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    permissions:
      issues: write
      checks: write
    steps:
      - uses: actions/checkout@v7
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    permissions:
      issues: write
      checks: write
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2

  versionary:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [cargo-audit, cargo-deny, test, extension]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      release_created: ${{ steps.versionary.outputs.release_created }}
      tag_name: ${{ steps.versionary.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Install Rust
        run: rustup toolchain install

      - id: versionary
        uses: jolars/versionary@v0
        with:
          github-token: ${{ secrets.RELEASE_TOKEN }}

  build-release-assets:
    name: Build & Upload Release Assets
    needs: versionary
    if: ${{ needs.versionary.outputs.release_created == 'true' }}
    uses: ./.github/workflows/packages.yml
    with:
      upload: "true"
      tag: ${{ needs.versionary.outputs.tag_name }}
    permissions:
      contents: write
      id-token: write
      attestations: write

  publish-code-extensions:
    name: Publish Code Extensions
    needs: [versionary, build-release-assets]
    if: ${{ needs.versionary.outputs.release_created == 'true' }}
    uses: ./.github/workflows/publish-code-extensions.yml
    secrets: inherit
    permissions:
      contents: read
