name: Build and Test

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * *"

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    if: github.event_name != 'schedule'
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable]

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --verbose

      - name: Build panache-wasm
        run: cargo build -p panache-wasm --target wasm32-unknown-unknown --verbose

      - name: Install shfmt for external formatter tests
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y shfmt

      - name: Run tests
        run: cargo test --verbose

  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    permissions:
      issues: write
      checks: write
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    permissions:
      issues: write
      checks: write
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  release-please:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [cargo-audit, cargo-deny, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  alias-root-tag:
    name: Create v* compatibility tag
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' && startsWith(needs.release-please.outputs.tag_name, 'panache-v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create compatibility tag
        run: |
          SOURCE_TAG="${{ needs.release-please.outputs.tag_name }}"
          ALIAS_TAG="v${SOURCE_TAG#panache-v}"

          if git ls-remote --tags origin "refs/tags/$ALIAS_TAG" | grep -q "$ALIAS_TAG"; then
            echo "Compatibility tag already exists: $ALIAS_TAG"
            exit 0
          fi

          git tag "$ALIAS_TAG" "${{ github.sha }}"
          git push origin "$ALIAS_TAG"

  build-release-assets:
    name: Build & Upload Release Assets
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/packages.yml
    with:
      upload: "true"
      tag: ${{ needs.release-please.outputs.tag_name }}
    permissions:
      contents: write
