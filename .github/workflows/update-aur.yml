name: Update AUR

on:
  workflow_run:
    workflows: ["Build and Test"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      version:
        description: "Version to update (e.g., 2.8.1, leave empty for latest release)"
        required: false
        type: string

jobs:
  trigger-aur-update:
    name: Trigger AUR Update
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main') }}

    steps:
      - name: Get latest release
        if: github.event_name == 'workflow_dispatch' && inputs.version == ''
        id: latest
        run: |
          LATEST=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name')
          echo "version=$LATEST" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from workflow_run
        if: github.event_name == 'workflow_run'
        id: workflow_run_version
        run: |
          HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
          TAG=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name')

          # Resolve tag commit (supports both lightweight and annotated tags).
          TAG_SHA=$(git ls-remote --tags "https://github.com/${{ github.repository }}.git" "refs/tags/${TAG}^{}" | awk '{print $1}')
          if [ -z "$TAG_SHA" ]; then
            TAG_SHA=$(git ls-remote --tags "https://github.com/${{ github.repository }}.git" "refs/tags/${TAG}" | awk '{print $1}')
          fi

          if [ -z "$TAG_SHA" ]; then
            echo "No resolvable SHA found for tag ${TAG}; skipping AUR dispatch."
            exit 0
          fi

          if [ "$TAG_SHA" != "$HEAD_SHA" ]; then
            echo "Latest release tag ${TAG} (${TAG_SHA}) does not match workflow SHA ${HEAD_SHA}; skipping."
            exit 0
          fi

          echo "version=$TAG" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger AUR repository
        if: ${{ inputs.version != '' || steps.latest.outputs.version != '' || steps.workflow_run_version.outputs.version != '' }}
        run: |
          VERSION="${{ inputs.version || steps.latest.outputs.version || steps.workflow_run_version.outputs.version }}"
          VERSION="${VERSION#v}"  # Remove 'v' prefix if present
          gh api repos/jolars/panache-aur/dispatches \
            -f event_type=new-release \
            -f client_payload[version]="$VERSION"
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
