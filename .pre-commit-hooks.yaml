# DEPRECATED: use https://github.com/jolars/panache-pre-commit instead.
# This file is kept for backward compatibility, but `pre-commit autoupdate`
# against `jolars/panache` resolves to unrelated sub-package tags
# (`panache-code-*`, `panache-formatter-*`, `panache-parser-*`) rather than
# the main `vX.Y.Z` release. See https://github.com/jolars/panache/issues/260.

- id: panache-format
  name: panache format
  description: "Format Quarto, Pandoc, and Markdown files with panache"
  entry: panache format --force-exclude
  language: node
  files: '\.(qmd|Rmd|md|markdown|mdown|mkd)$'
  require_serial: true

- id: panache-lint
  name: panache lint
  description: "Lint Quarto, Pandoc, and Markdown files with panache"
  entry: panache lint --force-exclude
  language: node
  files: '\.(qmd|Rmd|md|markdown|mdown|mkd)$'
  require_serial: true
