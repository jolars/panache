extend-exclude = [
  "assets/*",
  "docs/changelog.md",
  "docs/reference/_formatter-presets-details.qmd",
  "docs/reference/_linter-presets-details.qmd",
  "docs/reference/cli.qmd",
  "docs/changelog.d",
  "tests/**/*",
  "CHANGELOG.md",
]

[formatters]
r = "air"
toml = "taplo"
bash = "shfmt"
sh = "shfmt"
python = "ruff"
lua = "stylua"

[formatters.air]
stdin = true
args = ["format", "--stdin-file-path", "{}"]

[formatters.stylua]
cmd = "stylua"
args = ["--indent-type", "Spaces", "--indent-width", "2", "-"]

[linters]
r = "jarl"
python = "ruff"
sh = "shellcheck"
js = "eslint"
go = "staticcheck"
