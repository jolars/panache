extend-exclude = [
  "tests/*",
  "assets/*",
  "pandoc/*",
  "docs/reference/cli.qmd",
  "docs/changelog.md",
  "tests/",
  "docs/reference/_formatter-presets-details.qmd",
  "docs/reference/_linter-presets-details.qmd",
]

[formatters]
r = "air"
toml = "taplo"
bash = "shfmt"
sh = "shfmt"
python = "ruff"
lua = "stylua"

[formatters.stylua]
cmd = "stylua"
args = ["--indent-type", "Spaces", "--indent-width", "2", "-"]

[linters]
r = "jarl"
python = "ruff"
sh = "shellcheck"
js = "eslint"
go = "staticcheck"
