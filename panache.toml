include = ["docs/**/*.{md,Rmd,qmd}"]
extend-exclude = ["docs/user-guide/cli.qmd", "docs/changelog.md", "tests/"]

[formatters]
r = "air"
toml = "taplo"
bash = "shfmt"
sh = "shfmt"
python = "ruff"
lua = "stylua"

[formatters.stylua]
cmd = "stylua"
args = ["--indent-type", "Spaces", "--indent-width", "2", "-"]

[linters]
r = "jarl"
python = "ruff"
sh = "shellcheck"
js = "eslint"
go = "staticcheck"
